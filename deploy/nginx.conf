# efinmap nginx config — copy to /etc/nginx/sites-available/efinmap and symlink
# from sites-enabled/.
#
# Workflow:
#   1. Deploy this file as-is (HTTP only) and reload nginx.
#   2. Run: certbot --nginx -d efinmap.com -d www.efinmap.com
#      Certbot will auto-add ssl_certificate paths and an HTTP→HTTPS redirect.
#   3. Set up auto-renewal: systemctl enable --now certbot.timer

# ── HTTP ────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name efinmap.com www.efinmap.com;

    # certbot's ACME challenge needs to reach this on port 80 even after HTTPS
    # is enabled. Certbot will inject a 301 redirect for everything else.

    root /opt/efinmap/frontend;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Static frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Cache static assets
    location ~* \.(js|css|png|ico|woff2)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}

