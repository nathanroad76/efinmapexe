<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Watchlist">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>efinmap – 自选股</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    :root { --bg: #f3f4f6; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px 10px; color: #1f2937; }
    .container { max-width: 1000px; margin: 0 auto; padding-bottom: 40px; }

    /* Header */
    .main-header { text-align: center; margin-bottom: 20px; }
    .main-header h1 { font-size: 24px; font-weight: 800; color: #111; margin-bottom: 5px; }
    .main-header p  { color: #6b7280; font-size: 11px; margin: 0; }

    /* Nav */
    .nav-bar { display: flex; justify-content: center; align-items: center; gap: 15px;
               padding: 12px 0; margin: 15px 0; border-top: 1px solid #e5e7eb;
               border-bottom: 1px solid #e5e7eb; font-size: 14px; font-weight: 600; }
    .nav-bar a { text-decoration: none; color: #1f2937; }
    .nav-bar a:hover { color: #2563eb; }
    .nav-bar a.active { color: #2563eb; }
    .nav-sep  { color: #d1d5db; font-weight: 400; }

    /* Add stock section */
    .add-section { background: #fff; border-radius: 16px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 4px rgba(0,0,0,.05); }
    .add-form { display: flex; gap: 10px; }
    .add-input { flex: 1; padding: 10px 15px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
    .add-input:focus { outline: none; border-color: #2563eb; }
    .add-btn { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .add-btn:hover { background: #1d4ed8; }
    .add-btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .error-msg { color: #dc2626; font-size: 12px; margin-top: 8px; display: none; }

    /* Watchlist grid */
    .section-card { background: #fff; border-radius: 16px; padding: 15px 10px; margin-bottom: 20px; box-shadow: 0 2px 4px rgba(0,0,0,.05); }
    .section-title { font-size: 16px; font-weight: 800; margin-bottom: 15px; color: #111827; border-left: 4px solid #2563eb; padding-left: 10px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; }
    .empty-state p { margin: 8px 0; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 100%; }
    @media (min-width: 768px) { .grid { grid-template-columns: repeat(6, 1fr); gap: 10px; } }

    /* Card */
    .asset-card { border-radius: 12px; padding: 10px 4px; position: relative; display: flex; flex-direction: column; align-items: center; min-height: 185px; justify-content: space-between; box-shadow: 0 1px 2px rgba(0,0,0,.05); border: 1px solid rgba(0,0,0,.03); }
    .market-cap-badge { position: absolute; top: 4px; left: 4px; font-size: 8px; font-weight: 700; background: rgba(255,255,255,.7); padding: 1px 4px; border-radius: 4px; color: #374151; }
    .delete-btn { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,.1); border: none; color: #666; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .delete-btn:hover { background: #dc2626; color: white; }
    .card-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 5px; width: 100%; margin-top: 12px; }
    .logo-wrapper { width: 32px; height: 32px; border-radius: 50%; background: #fff; padding: 2px; box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo-img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    .ticker-symbol { font-size: 15px; font-weight: 900; line-height: 1.1; }
    .ticker-name { font-size: 9px; opacity: .8; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 95%; margin-bottom: 4px; }
    .data-pills-container { width: 96%; display: flex; flex-direction: column; gap: 4px; margin-bottom: 2px; }
    .data-pill { border-radius: 6px; padding: 3px 0; text-align: center; font-size: 11px; font-weight: 800; width: 100%; line-height: 1.2; }
    .pill-label { font-size: 8px; font-weight: 500; opacity: .7; margin-right: 2px; }
    .card-footer-pe { width: 100%; text-align: center; font-size: 9px; font-weight: 600; opacity: .6; margin-top: 4px; padding-top: 2px; border-top: 1px solid rgba(0,0,0,.05); }

    /* Stats footer */
    .stats-footer { margin-top: 15px; background: #f9fafb; border-radius: 12px; padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-item { display: flex; flex-direction: column; align-items: center; background: #fff; padding: 8px; border-radius: 8px; }
    .stat-title { font-size: 9px; color: #9ca3af; margin-bottom: 2px; text-transform: uppercase; }
    .stat-value { font-size: 13px; font-weight: 800; color: #111; }

    /* Loading */
    .loading { text-align: center; padding: 60px; color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="main-header">
      <h1>⭐ 我的自选股</h1>
      <p>快速追踪关注股票</p>
    </div>

    <div class="nav-bar">
      <span class="nav-icon">👉</span>
      <a href="/index.html">US</a>
      <span class="nav-sep">|</span>
      <a href="/hk.html">HK</a>
      <span class="nav-sep">|</span>
      <a href="/asia.html">JP/KR/TW</a>
      <span class="nav-sep">|</span>
      <a href="/watchlist.html" class="active">自选</a>
    </div>

    <div class="add-section">
      <div class="add-form">
        <input type="text" class="add-input" id="symbolInput" placeholder="输入代码，如 AAPL, 0700.HK, 9984.T" maxlength="20">
        <button class="add-btn" id="addBtn">添加</button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div id="watchlistContent">
      <div class="loading" id="loading">加载中...</div>
    </div>
  </div>

  <script>
    // ===== localStorage 操作 =====
    const STORAGE_KEY = 'efinmap_watchlist';
    let _loadingWatchlist = false;

    function getWatchlist() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveWatchlist(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    async function addStock() {
      const input = document.getElementById('symbolInput');
      const btn = document.getElementById('addBtn');
      const errorMsg = document.getElementById('errorMsg');
      const symbol = input.value.trim().toUpperCase();

      if (!symbol) {
        showError('请输入股票代码');
        return;
      }
      if (!/^[A-Z0-9.]+$/.test(symbol)) {
        showError('代码格式错误');
        return;
      }

      const list = getWatchlist();
      if (list.includes(symbol)) {
        showError('该股票已在自选列表');
        return;
      }

      // Disable button during fetch
      btn.disabled = true;
      btn.textContent = '添加中...';

      try {
        // First check if already in our database via API
        const checkRes = await fetch(`/api/v1/market/ticker/${symbol}`).catch(() => null);

        if (checkRes && checkRes.ok) {
          // Ticker exists, add to watchlist
          list.push(symbol);
          saveWatchlist(list);
          input.value = '';
          errorMsg.style.display = 'none';
          loadWatchlist();
        } else {
          // Not found locally, try to fetch from Yahoo via backend
          showError(`正在从 Yahoo Finance 获取 ${symbol}...`);

          const fetchRes = await fetch('/api/v1/market/watchlist/fetch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symbol: symbol })
          });

          if (fetchRes.ok) {
            const result = await fetchRes.json();
            list.push(symbol);
            saveWatchlist(list);
            input.value = '';
            errorMsg.style.display = 'none';
            showError(`✅ 已添加 ${result.stock?.name_cn || symbol}`);
            loadWatchlist();
          } else {
            const err = await fetchRes.json().catch(() => ({ detail: '获取失败' }));
            showError(`获取失败: ${err.detail || '请检查代码是否正确'}`);
          }
        }
      } catch (e) {
        showError('网络错误，请重试');
      } finally {
        btn.disabled = false;
        btn.textContent = '添加';
      }
    }

    function removeStock(symbol) {
      const list = getWatchlist().filter(s => s !== symbol);
      saveWatchlist(list);
      loadWatchlist();
    }

    function showError(msg) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      setTimeout(() => errorMsg.style.display = 'none', 3000);
    }

    // 绑定添加按钮 + 回车
    document.getElementById('addBtn')?.addEventListener('click', addStock);
    document.getElementById('symbolInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addStock();
    });

    // 删除按钮事件委托
    document.getElementById('watchlistContent')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.delete-btn');
      if (!btn) return;
      e.preventDefault();
      const sym = btn.dataset.symbol;
      if (sym) removeStock(sym);
    });

    // ===== 渲染 =====
    const INDEX_SYMBOLS = new Set(['SPX', 'IXIC', 'DJI', 'RUT']);

    function fmtPrice(symbol, price) {
      if (INDEX_SYMBOLS.has(symbol)) return price.toFixed(1);
      if (price < 10) return '$' + price.toFixed(2);
      if (price > 20000) return '$' + (price / 1000).toFixed(0) + 'k';
      return '$' + price.toFixed(1);
    }

    function fmtCap(cap) {
      if (!cap || cap === 0) return '';
      const T = cap / 1e12, B = cap / 1e9;
      if (T >= 1) return T.toFixed(1) + 'T';
      if (B >= 1) return B.toFixed(1) + 'B';
      return (cap / 1e6).toFixed(0) + 'M';
    }

    function sign(v) { return v >= 0 ? '+' : ''; }

    function getColorStyle(change) {
      const THRESHOLD = 5.0;
      const WHITE = [255, 255, 255];
      const DEEP_GREEN = [22, 163, 74];
      const DEEP_RED = [220, 38, 38];
      const abs = Math.abs(change);

      let bgColor, textColor, pillBg;

      if (change >= 0) {
        bgColor = abs < 0.5 ? 'rgb(255,255,255)' : interpolateRGB(abs, 0, THRESHOLD, WHITE, DEEP_GREEN);
        textColor = abs > 2.5 ? '#ffffff' : '#14532d';
        pillBg = abs > 2.5 ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.6)';
      } else {
        bgColor = abs < 0.5 ? 'rgb(255,255,255)' : interpolateRGB(abs, 0, THRESHOLD, WHITE, DEEP_RED);
        textColor = abs > 2.5 ? '#ffffff' : '#7f1d1d';
        pillBg = abs > 2.5 ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.6)';
      }
      return { bgColor, textColor, pillBg };
    }

    function interpolateRGB(val, minVal, maxVal, start, end) {
      val = Math.max(minVal, Math.min(maxVal, val));
      const t = (val - minVal) / (maxVal - minVal);
      return `rgb(${lerp(start[0], end[0], t)},${lerp(start[1], end[1], t)},${lerp(start[2], end[2], t)})`;
    }

    function lerp(a, b, t) { return Math.round(a + (b - a) * t); }

    function renderWatchlistCard(stock) {
      const { bgColor, textColor, pillBg } = getColorStyle(stock.daily_chg);
      const ytdColor = textColor === '#ffffff' ? '#ffffff' : (stock.ytd_chg >= 0 ? '#15803d' : '#b91c1c');
      const yoyColor = textColor === '#ffffff' ? '#ffffff' : (stock.yoy_25_chg >= 0 ? '#15803d' : '#b91c1c');

      const logo = stock.domain
        ? `<img class="logo-img" src="https://www.google.com/s2/favicons?domain=${stock.domain}&sz=128" onerror="this.style.display='none'">`
        : '';
      const peStr = stock.pe_ratio && stock.pe_ratio > 0 ? `PE ${Math.round(stock.pe_ratio)}` : 'PE --';
      const yahooUrl = 'https://finance.yahoo.com/quote/' + encodeURIComponent(stock.symbol) + '/';

      return `
<a href="${yahooUrl}" target="_blank" style="text-decoration:none;color:inherit;">
  <div class="asset-card" style="background-color:${bgColor};color:${textColor};transition:background-color .3s ease">
    <div class="market-cap-badge">${fmtCap(stock.market_cap)}</div>
    <button class="delete-btn" data-symbol="${stock.symbol}" title="删除">×</button>
    <div class="card-header">
      <div class="logo-wrapper">${logo}</div>
      <div class="ticker-symbol">${stock.symbol}</div>
      <div class="ticker-name">${stock.name_cn || stock.symbol}</div>
    </div>
    <div class="data-pills-container">
      <div class="data-pill" style="background:${pillBg};color:${textColor};opacity:0.9">${fmtPrice(stock.symbol, stock.price)}</div>
      <div class="data-pill" style="background:${pillBg};color:${textColor}">${sign(stock.daily_chg)}${stock.daily_chg.toFixed(2)}%</div>
      <div class="data-pill" style="background:${pillBg};color:${ytdColor};font-size:9px">
        <span class="pill-label">YTD</span>${sign(stock.ytd_chg)}${stock.ytd_chg.toFixed(1)}%
      </div>
      <div class="data-pill" style="background:${pillBg};color:${yoyColor};font-size:9px">
        <span class="pill-label">25 YoY</span>${sign(stock.yoy_25_chg)}${stock.yoy_25_chg.toFixed(1)}%
      </div>
    </div>
    <div class="card-footer-pe" style="border-color:${textColor}20">${peStr}</div>
  </div>
</a>`;
    }

    async function loadWatchlist() {
      if (_loadingWatchlist) return;
      _loadingWatchlist = true;

      const content = document.getElementById('watchlistContent');
      const symbols = getWatchlist();

      if (symbols.length === 0) {
        content.innerHTML = `
          <div class="section-card">
            <div class="section-title">自选列表</div>
            <div class="empty-state">
              <p>📭 暂无自选股</p>
              <p style="font-size: 12px;">在上方输入代码添加，支持美股/港股/日股等</p>
              <p style="font-size: 11px; margin-top: 12px;">例如：AAPL, NVDA, 0700.HK, 9984.T</p>
            </div>
          </div>
        `;
        _loadingWatchlist = false;
        return;
      }

      content.innerHTML = '<div class="loading" id="loading">加载自选数据...</div>';

      try {
        const [usRes, hkRes, asiaRes] = await Promise.all([
          fetch('/api/v1/market/us').catch(() => null),
          fetch('/api/v1/market/hk').catch(() => null),
          fetch('/api/v1/market/asia').catch(() => null)
        ]);

        const allStocks = {};
        for (const res of [usRes, hkRes, asiaRes]) {
          if (res && res.ok) {
            const data = await res.json();
            for (const group of data.groups || []) {
              for (const stock of group.stocks || []) {
                allStocks[stock.symbol] = stock;
              }
            }
          }
        }

        const watchlistStocks = [];
        const missingSymbols = [];
        for (const symbol of symbols) {
          if (allStocks[symbol]) {
            watchlistStocks.push(allStocks[symbol]);
          } else {
            missingSymbols.push(symbol);
          }
        }

        const up = watchlistStocks.filter(s => s.daily_chg >= 0).length;
        const avg = watchlistStocks.length > 0
          ? watchlistStocks.reduce((sum, s) => sum + s.daily_chg, 0) / watchlistStocks.length
          : 0;
        const bestDay = watchlistStocks.length > 0
          ? watchlistStocks.reduce((best, s) => s.daily_chg > best.daily_chg ? s : best, watchlistStocks[0])
          : null;
        const bestYtd = watchlistStocks.length > 0
          ? watchlistStocks.reduce((best, s) => s.ytd_chg > best.ytd_chg ? s : best, watchlistStocks[0])
          : null;

        const avgColor = avg >= 0 ? '#059669' : '#dc2626';
        const cards = watchlistStocks.map(s => renderWatchlistCard(s)).join('');
        const missingHtml = missingSymbols.length > 0
          ? `<div style="text-align:center;color:#9ca3af;font-size:11px;margin-top:10px">未找到数据: ${missingSymbols.join(', ')}</div>`
          : '';

        content.innerHTML = `
          <div class="section-card">
            <div class="section-title">自选列表 (${watchlistStocks.length})</div>
            <div class="grid">${cards}</div>
            ${missingHtml}
            <div class="stats-footer">
              <div class="stat-item"><span class="stat-title">上涨</span><span class="stat-value">${up}/${watchlistStocks.length}</span></div>
              <div class="stat-item"><span class="stat-title">平均涨跌</span><span class="stat-value" style="color:${avgColor}">${sign(avg)}${avg.toFixed(2)}%</span></div>
              ${bestDay ? `<div class="stat-item"><span class="stat-title">今日最佳</span><span class="stat-value" style="color:#059669;font-size:11px">${bestDay.symbol} ${sign(bestDay.daily_chg)}${bestDay.daily_chg.toFixed(1)}%</span></div>` : ''}
              ${bestYtd ? `<div class="stat-item"><span class="stat-title">YTD 最佳</span><span class="stat-value" style="color:#059669;font-size:11px">${bestYtd.symbol} ${sign(bestYtd.ytd_chg)}${bestYtd.ytd_chg.toFixed(1)}%</span></div>` : ''}
            </div>
          </div>
        `;
      } catch (err) {
        content.innerHTML = `
          <div class="section-card">
            <div style="text-align:center;padding:40px;color:#6b7280">
              <p>数据加载失败</p>
              <p style="font-size:12px">${err.message}</p>
              <button onclick="loadWatchlist()" style="margin-top:16px;padding:8px 16px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer">重试</button>
            </div>
          </div>
        `;
      } finally {
        _loadingWatchlist = false;
      }
    }

    // 初始化加载
    loadWatchlist();
  </script>
</body>
</html>
