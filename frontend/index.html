<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="US Market">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>efinmap – US Market</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    :root { --bg: #f3f4f6; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px 10px; color: #1f2937; }
    .container { max-width: 1000px; margin: 0 auto; padding-bottom: 40px; }

    /* Header */
    .main-header { text-align: center; margin-bottom: 20px; }
    .main-header h1 { font-size: 24px; font-weight: 800; color: #111; margin-bottom: 5px; }
    .main-header p  { color: #6b7280; font-size: 11px; margin: 0; }
    .status-badge   { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; margin-top: 5px; }
    .status-open    { background: #d1fae5; color: #065f46; }
    .status-closed  { background: #fee2e2; color: #991b1b; }

    /* Nav */
    .nav-bar { display: flex; justify-content: center; align-items: center; gap: 15px;
               padding: 12px 0; margin: 15px 0; border-top: 1px solid #e5e7eb;
               border-bottom: 1px solid #e5e7eb; font-size: 14px; font-weight: 600; }
    .nav-bar a { text-decoration: none; color: #1f2937; }
    .nav-bar a:hover { color: #2563eb; }
    .nav-sep  { color: #d1d5db; font-weight: 400; }

    /* Section */
    .section-card  { background: #fff; border-radius: 16px; padding: 15px 10px; margin-bottom: 20px; box-shadow: 0 2px 4px rgba(0,0,0,.05); }
    .section-title { font-size: 16px; font-weight: 800; margin-bottom: 15px; color: #111827; border-left: 4px solid #f59e0b; padding-left: 10px; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 100%; }
    @media (min-width: 768px) { .grid { grid-template-columns: repeat(6, 1fr); gap: 10px; } }

    /* Card */
    .asset-card { border-radius: 12px; padding: 10px 4px; position: relative; display: flex; flex-direction: column; align-items: center; min-height: 185px; justify-content: space-between; box-shadow: 0 1px 2px rgba(0,0,0,.05); border: 1px solid rgba(0,0,0,.03); }
    .market-cap-badge { position: absolute; top: 4px; left: 4px; font-size: 8px; font-weight: 700; background: rgba(255,255,255,.7); padding: 1px 4px; border-radius: 4px; color: #374151; }
    .type-badge       { position: absolute; top: 4px; right: 4px; font-size: 8px; font-weight: 600; opacity: .5; }
    .card-header      { display: flex; flex-direction: column; align-items: center; margin-bottom: 5px; width: 100%; margin-top: 12px; }
    .logo-wrapper     { width: 32px; height: 32px; border-radius: 50%; background: #fff; padding: 2px; box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo-img         { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    .ticker-symbol    { font-size: 15px; font-weight: 900; line-height: 1.1; }
    .ticker-name      { font-size: 9px; opacity: .8; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 95%; margin-bottom: 4px; }
    .data-pills-container { width: 96%; display: flex; flex-direction: column; gap: 4px; margin-bottom: 2px; }
    .data-pill        { border-radius: 6px; padding: 3px 0; text-align: center; font-size: 11px; font-weight: 800; width: 100%; line-height: 1.2; }
    .pill-label       { font-size: 8px; font-weight: 500; opacity: .7; margin-right: 2px; }
    .card-footer-pe   { width: 100%; text-align: center; font-size: 9px; font-weight: 600; opacity: .6; margin-top: 4px; padding-top: 2px; border-top: 1px solid rgba(0,0,0,.05); }

    /* Stats footer */
    .stats-footer { margin-top: 15px; background: #f9fafb; border-radius: 12px; padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-item    { display: flex; flex-direction: column; align-items: center; background: #fff; padding: 8px; border-radius: 8px; }
    .stat-title   { font-size: 9px; color: #9ca3af; margin-bottom: 2px; text-transform: uppercase; }
    .stat-value   { font-size: 13px; font-weight: 800; color: #111; }

    /* Loading */
    .loading { text-align: center; padding: 60px; color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">Loading US market data…</div>
  </div>
  <script src="/heatmap.js"></script>
  <script>
    fetchAndRender('/api/v1/market/us', 'app', 'US Market Watch', 'US');
  </script>
</body>
</html>
